backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: nl

collections:
  - name: projecten
    label: Projecten
    folder: src/pages/projecten
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL-vriendelijke naam, bijv. router-slee" }
      - label: Categorie
        name: category
        widget: select
        options:
          - 3D Printen
          - CNC & Houtbewerking
          - Tabletop
      - { label: Beschrijving, name: description, widget: string }
      - { label: Datum, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD-MM-YYYY, time_format: false }
      - { label: Omslagfoto, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Inhoud, name: body, widget: markdown }

  - name: tools
    label: Tools
    folder: src/pages/tools
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    filter:
      field: slug
      pattern: "^(?!index$).*"
    fields:
      - { label: Naam, name: name, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL-vriendelijke naam, bijv. bambu-p1s" }
      - label: Categorie
        name: category
        widget: select
        options:
          - 3D Printen
          - CNC
          - Houtbewerking
          - Resin
      - { label: Beschrijving, name: description, widget: string }
      - { label: Foto, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Inhoud, name: body, widget: markdown }
